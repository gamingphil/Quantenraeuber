<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantenräuber</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
}

#text {
    position: absolute;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-size: 10vw;
    font-family: sans-serif;
    font-weight: bold;
    z-index: 10;
    transition: opacity 0.4s;
}

video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
</style>
</head>
<body>

<div id="text">Quantenräuber</div>

<video id="video" playsinline preload="auto">
    <source src="bananencreme.mp4" type="video/mp4">
</video>

<script>
const video = document.getElementById("video");
const text = document.getElementById("text");

// PRELOAD muted first (allowed)
video.muted = true;

video.play().then(() => {
    console.log("Muted preload started");
}).catch(err => {
    console.log("Initial preload blocked", err);
});

// After 3 sec try to enable sound
setTimeout(async () => {

    text.style.opacity = "0";

    // restart from beginning
    video.currentTime = 0;

    try {
        video.pause();

        // unmute
        video.muted = false;
        video.volume = 1;

        // IMPORTANT: play AGAIN after unmuting
        await video.play();

        console.log("Playing with sound");

    } catch (err) {

        console.log("Sound autoplay blocked");

        // fallback
        video.muted = true;
        video.play();
    }

}, 3000);
</script>

</body>
</html>
