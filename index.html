<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Quantenräuber</title>

<style>
    html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #121212;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: system-ui, sans-serif;
    }

    h1 {
        position: absolute;
        z-index: 2;
        color: white;
        font-size: 10vw;
        margin: 0;
        transition: opacity 0.5s ease;
        user-select: none;
    }

    video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
</style>
</head>
<body>

<h1 id="text">Quantenräuber</h1>

<video id="video" playsinline preload="auto">
    <source src="bananencreme.mp4" type="video/mp4">
</video>

<script>
const text = document.getElementById("text");
const video = document.getElementById("video");

// Start hidden
video.style.opacity = "0";

// Wait 3 seconds
setTimeout(() => {
    text.style.opacity = "0";

    setTimeout(() => {
        text.remove();

        video.style.opacity = "1";

        // Try autoplay with sound
        video.muted = false;
        video.volume = 1;

        const playPromise = video.play();

        if (playPromise !== undefined) {
            playPromise.catch(() => {
                // Browser blocked sound autoplay
                // Fallback: autoplay muted
                video.muted = true;
                video.play();
            });
        }

    }, 500);

}, 3000);
</script>

</body>
</html>
